
baseURL: 'https://bakhrululum19.github.io'
# languageCode: 'en'
title: 'Bakhrul Ulum - Blog'
theme: "PaperMod"
copyright: "Copyright 2023 - All rights reserved." 

relativeURLs: true
# uglyURLs: true

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
# googleAnalytics: UA-123-45

minify:
    disableXML: true
    # minifyOutput: true
    
languages:
    en:
        languageName: "English"
        weight: 1
        taxonomies:
          category: categories
          tag: tags
          series: series
        menu:
            main:
                - name: Bykefulness
                  url: bykefulness/
                  weight: 1
                - name: Get in touch
                  url: mailto:bakhrululum19@gmail.com
                  weight: 5
                  
#                - name: Archive
#                  url: posts/
#                  weight: 5
#                - name: Search
#                  url: search/
#                  weight: 10
#                - name: Tags
#                  url: tags/
#                  weight: 10


outputs:
    home:
        - HTML
        - RSS
        - JSON

params:
    env: production # to enable google analytics, opengraph, twitter-cards and schema.
    description: "Discover my personal portfolio and project documentation blog, where I showcase my creative endeavors. Dive into a collection of projects that highlight my skills and experience in various fields. Gain insights into my work and explore the outcomes of my creative pursuits."
    author: Bakhrul Ulum
    # author: ["Me", "You"] # multiple authors

    defaultTheme: auto
    # disableThemeToggle: true
    ShowShareButtons: true
    ShowReadingTime: true
    # disableSpecial1stPost: true
    displayFullLangName: true
    ShowPostNavLinks: true
    ShowBreadCrumbs: true
    ShowCodeCopyButtons: true
    ShowRssButtonInSectionTermList: true
    ShowToc: false
    comments: true
    images: ["papermod-cover.png"]

    profileMode:
        enabled: false
        title: PaperMod
        imageUrl: "#"
        imageTitle: my image
        # imageWidth: 120
        # imageHeight: 120
        buttons:
            - name: Archives
              url: archives
            - name: Tags
              url: tags

    homeInfoParams:
        Title: "Hi!"
        Content: >
            Welcome to my blog portfolio! I'm a self-employed digital marketing strategist specializing in organic and paid digital marketing. With a focus on sustainable business practices, I explore strategies that make a positive impact.
         # Add the following line to include the image
        Image: "/images/bakhrul-github.jpg"  # Replace "your-image.jpg" with the filename of your image

    socialIcons:
        - name: twitter
          url: "https://twitter.com/bakhrululum19"
        - name: facebook
          url: "https://facebook.com/bakhrululum1993"
        - name: instagram
          url: "https://instagram.com/bykefulness"
        - name: LinkedIn
          url: "https://www.linkedin.com/in/bakhrululum19"


    editPost:
        URL: "https://github.com/packingpanic/blog/tree/main/content"
        Text: "Suggest Changes" # edit text
        appendFilePath: true # to append file path to Edit link

    # label:
    #     text: "Home"
    #     icon: icon.png
    #     iconHeight: 35

    # analytics:
    #     google:
    #         SiteVerificationTag: "XYZabc"

    assets:
        disableHLJS: true
        # from assets/logo-ball-for-favicon
        favicon: "/favicon16x16.ico"
        favicon16x16: "/favicon16x16.png"
        favicon32x32: "/favicon32x32.png"
        apple_touch_icon: "/favicon-appletouch.png"
        safari_pinned_tab: "/favicon-safari.svg"

    # cover:
    #     hidden: true # hide everywhere but not in structured data
    #     hiddenInList: true # hide on list pages and home
    #     hiddenInSingle: true # hide on single page

    # fuseOpts:
    #     isCaseSensitive: false
    #     shouldSort: true
    #     location: 0
    #     distance: 1000
    #     threshold: 0.4
    #     minMatchCharLength: 0
    #     keys: ["title", "permalink", "summary", "content"]

markup:
    goldmark:
        renderer:
            unsafe: true
    highlight:
        noClasses: false
        # anchorLineNos: true
        # codeFences: true
        # guessSyntax: true
        # lineNos: true
        # style: monokai

privacy:
    vimeo:
        disabled: false
        simple: true

    twitter:
        disabled: false
        enableDNT: true
        simple: true

    instagram:
        disabled: false
        simple: true

    youtube:
        disabled: false
        privacyEnhanced: true

services:
    instagram:
        disableInlineCSS: true
    twitter:
        disableInlineCSS: true
